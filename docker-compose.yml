version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: billing-bot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres18
      POSTGRES_DB: indian_freight_billing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - billing_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indian_freight_billing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  webhook-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: billing-bot-nestjs-app
    container_name: billing-bot-nestjs-app
    working_dir: /usr/src/app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${PORT:-3000}
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - billing_network
    command: npm run start:prod
    
volumes:
  postgres_data:

networks:
  billing_network:
    driver: bridge